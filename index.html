<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modes Carousel</title>
<style>
@font-face {
  font-family: 'HaimVariable';
  src: url('HaimVariable-VF-TRIAL.ttf') format('truetype');
  font-weight: 100 900;
}
@font-face {
  font-family: 'HaimClassic';
  src: url('haim-classic-regular-fm.otf') format('opentype');
  font-weight: 400;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;font-family:'HaimVariable',sans-serif;overflow:hidden;}

#mc-right{position:fixed;inset:0;width:100vw;height:100vh;background:#c8e8f5;overflow:hidden;}
#mc-canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}

.ui-overlay{position:fixed;bottom:0;left:0;right:0;padding:16px 28px;display:flex;align-items:center;gap:16px;background:linear-gradient(transparent,rgba(0,0,0,0.55));z-index:10;}

.mode-info{position:fixed;top:28px;left:36px;z-index:10;pointer-events:none;}
.mc-label{font-size:10px;font-weight:600;font-family:'HaimVariable',sans-serif;letter-spacing:0.1em;color:rgba(255,255,255,0.55);text-transform:uppercase;margin-bottom:4px;}
.mc-title{font-size:26px;font-weight:500;font-family:'HaimVariable',sans-serif;color:#FF0000;margin-bottom:4px;line-height:1.1;text-shadow:0 1px 8px rgba(0,0,0,0.3);}
.mc-desc{font-size:12px;font-family:'HaimVariable',sans-serif;color:rgba(255,255,255,0.7);line-height:1.55;max-width:340px;text-shadow:0 1px 4px rgba(0,0,0,0.5);}

.nav-area{position:fixed;top:32px;right:36px;z-index:10;display:flex;align-items:center;gap:10px;}
.mc-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.6);background:rgba(0,0,0,0.25);backdrop-filter:blur(8px);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:#fff;transition:all 0.15s;flex-shrink:0;}
.mc-btn:hover{background:rgba(255,255,255,0.15);}
.mc-dots{display:flex;gap:6px;}
.mc-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.35);cursor:pointer;transition:all 0.2s;}
.mc-dot.active{background:#FF0000;transform:scale(1.3);}
.mc-num{font-family:'HaimClassic',sans-serif;font-size:11.4px;color:rgba(255,255,255,0.5);}

.exp-btn{font-family:'HaimVariable',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.05em;padding:8px 18px;border-radius:100px;border:1.5px solid rgba(255,255,255,0.6);background:rgba(0,0,0,0.3);backdrop-filter:blur(8px);color:#fff;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.exp-btn:hover{background:rgba(255,255,255,0.15);}
.exp-btn:disabled{opacity:0.4;cursor:not-allowed;}
.exp-btn.recording{background:#FF0000;border-color:#FF0000;color:#fff;}
#exp-status{font-size:11px;color:rgba(255,255,255,0.6);}
.rec-dur-wrap{display:flex;align-items:center;gap:6px;margin-left:auto;}
.rec-dur-wrap label{font-size:11px;color:rgba(255,255,255,0.5);}
.rec-dur-wrap input{width:48px;padding:5px 8px;border:1px solid rgba(255,255,255,0.3);border-radius:100px;font-size:11px;text-align:center;background:rgba(0,0,0,0.3);color:#fff;outline:none;}
</style>
</head>
<body>

<div id="mc-right"><canvas id="mc-canvas"></canvas></div>

<div class="mode-info">
  <div class="mc-label">Analysis Mode</div>
  <div class="mc-title" id="mc-name"></div>
  <div class="mc-desc" id="mc-desc"></div>
</div>

<div class="nav-area">
  <button class="mc-btn" id="mc-prev">‹</button>
  <div class="mc-dots" id="mc-dots"></div>
  <button class="mc-btn" id="mc-next">›</button>
  <div class="mc-num" id="mc-num"></div>
</div>

<div class="ui-overlay">
  <button class="exp-btn" id="exp-current">⬇ Download current</button>
  <button class="exp-btn" id="exp-all">⬇ Download all 6</button>
  <span id="exp-status"></span>
  <div class="rec-dur-wrap">
    <label for="rec-dur">Duration (s)</label>
    <input type="number" id="rec-dur" value="5" min="2" max="30">
  </div>
</div>

<script>
const RED = '#FF0000';
const MODES = [
  { name:'Gaze',          num:'01 / 06', desc:'Raw gaze positions sampled continuously — every point where the eye looked, frame by frame.' },
  { name:'Fixation',      num:'02 / 06', desc:'Sustained gaze on a single region for ≥200ms. Indicates active cognitive processing.' },
  { name:'Saccade',       num:'03 / 06', desc:'Rapid eye movements between fixations. Reveals how the eye explores and scans a scene.' },
  { name:'Scan path',     num:'04 / 06', desc:'The chronological sequence of fixations — the full visual journey across the image.' },
  { name:'Heatmap',       num:'05 / 06', desc:'Density map of visual attention. Hotter areas received more and longer fixations.' },
  { name:'First fixation',num:'06 / 06', desc:'The very first region noticed — the pre-conscious entry point of visual attention.' }
];
const NAMES = ['gaze','fixation','saccade','scanpath','heatmap','firstfix'];

const gazeLog = [
  {x:0.18,y:0.30},{x:0.20,y:0.28},{x:0.22,y:0.32},
  {x:0.50,y:0.22},{x:0.52,y:0.24},{x:0.54,y:0.20},
  {x:0.74,y:0.50},{x:0.72,y:0.52},{x:0.76,y:0.48},
  {x:0.34,y:0.68},{x:0.36,y:0.66},{x:0.38,y:0.70},
  {x:0.60,y:0.78},{x:0.62,y:0.76},{x:0.58,y:0.80},
  {x:0.28,y:0.48},{x:0.50,y:0.50},{x:0.65,y:0.35}
];
const fixHist = [
  {x:0.20,y:0.30,duration:380},
  {x:0.52,y:0.22,duration:260},
  {x:0.74,y:0.50,duration:500},
  {x:0.36,y:0.68,duration:180},
  {x:0.61,y:0.78,duration:320}
];
const sacHist = [
  {fromX:0.20,fromY:0.30,toX:0.52,toY:0.22},
  {fromX:0.52,fromY:0.22,toX:0.74,toY:0.50},
  {fromX:0.74,fromY:0.50,toX:0.36,toY:0.68},
  {fromX:0.36,fromY:0.68,toX:0.61,toY:0.78}
];

let cur=0, raf=null, stopFlag=false;
let canvas, ctx, W, H;
let skyImg = null;

const _img = new Image();
_img.onload = () => { skyImg = _img; };
_img.src = 'sky.png';

function drawBg() {
  if (skyImg) { ctx.drawImage(skyImg, 0, 0, W, H); }
  else { ctx.fillStyle = '#c8e8f5'; ctx.fillRect(0, 0, W, H); }
}

function setup() {
  canvas = document.getElementById('mc-canvas');
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);
}

function drawArrow(fx, fy, tx, ty) {
  ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(tx,ty); ctx.stroke();
  const a = Math.atan2(ty-fy, tx-fx), l = 14;
  ctx.beginPath();
  ctx.moveTo(tx, ty);
  ctx.lineTo(tx - l*Math.cos(a-Math.PI/6), ty - l*Math.sin(a-Math.PI/6));
  ctx.lineTo(tx - l*Math.cos(a+Math.PI/6), ty - l*Math.sin(a+Math.PI/6));
  ctx.closePath(); ctx.fillStyle = RED; ctx.fill();
}

function drawFixLabel(cx, cy, r, duration) {
  const numStr = Math.round(duration) + '';
  const numSize = 13.4;
  const txtSize = 13;
  ctx.font = '400 ' + numSize + 'px HaimClassic,sans-serif';
  const numW = ctx.measureText(numStr).width;
  ctx.font = '500 ' + txtSize + 'px HaimVariable,sans-serif';
  const msW = ctx.measureText('ms').width;
  const gap = 2;
  const startX = cx - (numW + gap + msW) / 2;
  const labelY = cy + r + 18;
  ctx.fillStyle = RED;
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.font = '400 ' + numSize + 'px HaimClassic,sans-serif';
  ctx.fillText(numStr, startX, labelY);
  ctx.font = '500 ' + txtSize + 'px HaimVariable,sans-serif';
  ctx.fillText('ms', startX + numW + gap, labelY);
}

function startAnim(idx) {
  stopFlag = true; if(raf) cancelAnimationFrame(raf); clearTimeout(window._mcTimer);
  setTimeout(() => {
    stopFlag = false; setup();
    [runGaze,runFixation,runSaccade,runScanPath,runHeatmap,runFirstFix][idx]();
  }, 60);
}

function runGaze() {
  let dots=[], dIdx=0, t=0;
  function addDot() {
    const p = gazeLog[dIdx % gazeLog.length];
    const jit = () => (Math.random()-0.5)*0.06;
    dots.push({x:Math.max(0.05,Math.min(0.95,p.x+jit())),y:Math.max(0.05,Math.min(0.95,p.y+jit())),age:0});
    if(dots.length>28) dots.shift(); dIdx++;
  }
  for(let i=0;i<12;i++) addDot();
  function draw() {
    if(stopFlag) return;
    drawBg();
    for(const d of dots) {
      d.age++;
      const alpha = Math.max(0,1-d.age/160);
      ctx.beginPath(); ctx.arc(d.x*W, d.y*H, 5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,0,0,' + (alpha*0.85).toFixed(2) + ')'; ctx.fill();
    }
    t++; if(t%8===0) addDot();
    raf = requestAnimationFrame(draw);
  }
  draw();
}

function maxR(dur) { return Math.min(12 + dur/50, Math.min(W,H)*0.12); }

function runFixation() {
  let fIdx=0, shown=[], start=null, phase='grow';
  function drawAll() {
    for(const fix of shown) {
      const cx=fix.x*W, cy=fix.y*H, r=maxR(fix.duration);
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,0,0,0.15)'; ctx.fill();
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.strokeStyle=RED; ctx.lineWidth=3; ctx.stroke();
      drawFixLabel(cx, cy, r, fix.duration);
    }
  }
  function draw(ts) {
    if(stopFlag) return;
    if(!start) start=ts;
    const elapsed = ts-start;
    drawBg();
    if(phase==='grow') {
      const fix=fixHist[fIdx], prog=Math.min(1,elapsed/550);
      const cx=fix.x*W, cy=fix.y*H, r=maxR(fix.duration)*prog;
      drawAll();
      ctx.beginPath(); ctx.arc(cx,cy,Math.max(1,r),0,Math.PI*2);
      ctx.fillStyle='rgba(255,0,0,' + (0.15*prog).toFixed(2) + ')'; ctx.fill();
      ctx.beginPath(); ctx.arc(cx,cy,Math.max(1,r),0,Math.PI*2);
      ctx.strokeStyle='rgba(255,0,0,' + prog.toFixed(2) + ')'; ctx.lineWidth=3; ctx.stroke();
      if(prog>=1) { shown.push(fix); fIdx=(fIdx+1)%fixHist.length; phase='wait'; start=ts; }
    } else {
      drawAll();
      if(elapsed>700) { if(fIdx===0) shown=[]; phase='grow'; start=ts; }
    }
    raf = requestAnimationFrame(draw);
  }
  raf = requestAnimationFrame(draw);
}

function runSaccade() {
  let sIdx=0, drawn=[], start=null, phase='draw';
  function drawOne(sc, full) {
    ctx.strokeStyle=RED; ctx.lineWidth=3;
    const fx=sc.fromX*W, fy=sc.fromY*H, tx=sc.toX*W, ty=sc.toY*H;
    if(full) { drawArrow(fx,fy,tx,ty); }
    else { ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(tx,ty); ctx.stroke(); }
  }
  function drawAll() { for(const sc of drawn) drawOne(sc,true); }
  function draw(ts) {
    if(stopFlag) return;
    if(!start) start=ts;
    const elapsed=ts-start;
    drawBg();
    if(phase==='draw') {
      const sc=sacHist[sIdx], prog=Math.min(1,elapsed/350);
      const fx=sc.fromX*W, fy=sc.fromY*H, tx=sc.toX*W, ty=sc.toY*H;
      const ex=fx+(tx-fx)*prog, ey=fy+(ty-fy)*prog;
      drawAll();
      ctx.strokeStyle=RED; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(ex,ey); ctx.stroke();
      if(prog>=1) { drawn.push(sc); sIdx=(sIdx+1)%sacHist.length; phase='wait'; start=ts; }
    } else {
      drawAll();
      if(elapsed>800) { if(sIdx===0) drawn=[]; phase='draw'; start=ts; }
    }
    raf = requestAnimationFrame(draw);
  }
  raf = requestAnimationFrame(draw);
}

function runScanPath() {
  let n=0, start=null, phase='add';
  const NODE_R = Math.round(Math.min(W,H)*0.025);
  function drawN(count) {
    drawBg();
    if(count>=2) {
      ctx.save(); ctx.setLineDash([6,9]);
      ctx.strokeStyle=RED; ctx.lineWidth=3;
      for(let j=0;j<count-1;j++) {
        const a=fixHist[j], b=fixHist[j+1];
        const ax=a.x*W, ay=a.y*H, bx=b.x*W, by=b.y*H;
        const dx=bx-ax, dy=by-ay, dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<1) continue;
        const ux=dx/dist, uy=dy/dist;
        ctx.beginPath();
        ctx.moveTo(ax+ux*NODE_R, ay+uy*NODE_R);
        ctx.lineTo(bx-ux*NODE_R, by-uy*NODE_R);
        ctx.stroke();
      }
      ctx.setLineDash([]); ctx.restore();
    }
    for(let j=0;j<count;j++) {
      const p=fixHist[j], cx=p.x*W, cy=p.y*H;
      ctx.beginPath(); ctx.arc(cx,cy,NODE_R,0,Math.PI*2);
      ctx.fillStyle='rgba(255,0,0,0.15)'; ctx.fill();
      ctx.beginPath(); ctx.arc(cx,cy,NODE_R,0,Math.PI*2);
      ctx.strokeStyle=RED; ctx.lineWidth=3; ctx.stroke();
      ctx.fillStyle=RED;
      ctx.font='400 ' + Math.round(NODE_R*0.9*1.032) + 'px HaimClassic,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(j+1, cx, cy);
    }
  }
  function draw(ts) {
    if(stopFlag) return;
    if(!start) start=ts;
    const elapsed=ts-start;
    if(phase==='add') {
      if(elapsed>700) { n++; drawN(n); if(n>=fixHist.length) phase='pause'; start=ts; }
      else drawN(n);
    } else {
      drawN(n);
      if(elapsed>1400) { n=0; phase='add'; start=ts; }
    }
    raf = requestAnimationFrame(draw);
  }
  raf = requestAnimationFrame(draw);
}

function runHeatmap() {
  const hmW=320, hmH=180, hm=new Float32Array(hmW*hmH);
  const sigma=0.10*Math.max(hmW,hmH), r=Math.ceil(3*sigma), inv2=1/(2*sigma*sigma);
  const allPts=[];
  for(let rep=0;rep<3;rep++) for(const p of gazeLog) {
    const jx=(Math.random()-0.5)*0.08, jy=(Math.random()-0.5)*0.08;
    allPts.push({x:Math.max(0.05,Math.min(0.95,p.x+jx)),y:Math.max(0.05,Math.min(0.95,p.y+jy))});
  }
  function addPoint(p) {
    const gx=p.x*hmW, gy=p.y*hmH;
    const x0=Math.max(0,Math.floor(gx-r)), x1=Math.min(hmW-1,Math.ceil(gx+r));
    const y0=Math.max(0,Math.floor(gy-r)), y1=Math.min(hmH-1,Math.ceil(gy+r));
    for(let y=y0;y<=y1;y++) for(let x=x0;x<=x1;x++)
      hm[y*hmW+x] += 0.22*Math.exp(-((x-gx)**2+(y-gy)**2)*inv2);
  }
  function getMSSegs(i,T,R,B,L){switch(i){case 1:return[[L,B]];case 2:return[[R,B]];case 3:return[[L,R]];case 4:return[[T,R]];case 5:return[[T,R],[L,B]];case 6:return[[T,B]];case 7:return[[T,L]];case 8:return[[T,L]];case 9:return[[T,B]];case 10:return[[L,T],[R,B]];case 11:return[[T,R]];case 12:return[[L,R]];case 13:return[[R,B]];case 14:return[[L,B]];default:return[];}}
  function render() {
    drawBg();
    let mx=0; for(let i=0;i<hm.length;i++) if(hm[i]>mx) mx=hm[i];
    if(mx<0.01) return;
    const M=8, levels=[0.15,0.30,0.50,0.70,0.88];
    for(const lv of levels) {
      ctx.strokeStyle='rgba(255,0,0,' + Math.min(1,0.35+lv*0.65).toFixed(2) + ')';
      ctx.lineWidth=3.5; ctx.beginPath();
      for(let cy2=0;cy2<hmH-1;cy2++) for(let cx2=0;cx2<hmW-1;cx2++) {
        const vTL=hm[cy2*hmW+cx2]/mx, vTR=hm[cy2*hmW+(cx2+1)]/mx;
        const vBR=hm[(cy2+1)*hmW+(cx2+1)]/mx, vBL=hm[(cy2+1)*hmW+cx2]/mx;
        const idx2=(vTL>=lv?8:0)+(vTR>=lv?4:0)+(vBR>=lv?2:0)+(vBL>=lv?1:0);
        if(idx2===0||idx2===15) continue;
        const sx0=M+cx2*(W-2*M)/hmW, sx1=M+(cx2+1)*(W-2*M)/hmW;
        const sy0=M+cy2*(H-2*M)/hmH, sy1=M+(cy2+1)*(H-2*M)/hmH;
        const lp=(v0,v1)=>Math.abs(v1-v0)<1e-10?0.5:Math.max(0,Math.min(1,(lv-v0)/(v1-v0)));
        const T2=[sx0+lp(vTL,vTR)*(sx1-sx0),sy0], R2=[sx1,sy0+lp(vTR,vBR)*(sy1-sy0)];
        const B2=[sx0+lp(vBL,vBR)*(sx1-sx0),sy1], L2=[sx0,sy0+lp(vTL,vBL)*(sy1-sy0)];
        for(const[p1,p2]of getMSSegs(idx2,T2,R2,B2,L2)){ctx.moveTo(p1[0],p1[1]);ctx.lineTo(p2[0],p2[1]);}
      }
      ctx.stroke();
    }
  }
  let ptIdx=0;
  function step() {
    if(stopFlag) return;
    for(let b=0;b<5&&ptIdx<allPts.length;b++,ptIdx++) addPoint(allPts[ptIdx]);
    render();
    if(ptIdx<allPts.length) { window._mcTimer=setTimeout(step,80); }
    else { window._mcTimer=setTimeout(()=>{ if(!stopFlag){for(let i=0;i<hm.length;i++)hm[i]=0;ptIdx=0;setTimeout(step,400);} },2500); }
  }
  setTimeout(step,200);
}

function runFirstFix() {
  const fix={x:0.35,y:0.45};
  let phase='flash', start=null;
  function draw(ts) {
    if(stopFlag) return;
    if(!start) start=ts;
    const elapsed=ts-start, cx=fix.x*W, cy=fix.y*H;
    drawBg();
    if(phase==='flash') {
      const prog=Math.min(1,elapsed/700);
      ctx.beginPath(); ctx.arc(cx,cy,12+prog*60,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,0,0,' + ((1-prog)*0.85).toFixed(2) + ')'; ctx.lineWidth=3; ctx.stroke();
      ctx.beginPath(); ctx.arc(cx,cy,Math.max(2,20*prog),0,Math.PI*2);
      ctx.fillStyle='rgba(255,0,0,' + prog.toFixed(2) + ')'; ctx.fill();
      if(prog>=1) { phase='pulse'; start=ts; }
    } else {
      const pt=(elapsed%1400)/1400, pr=20+Math.sin(pt*Math.PI*2)*8;
      ctx.beginPath(); ctx.arc(cx,cy,pr,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,0,0,0.45)'; ctx.lineWidth=2; ctx.stroke();
      ctx.beginPath(); ctx.arc(cx,cy,20,0,Math.PI*2);
      ctx.fillStyle=RED; ctx.fill();
      ctx.fillStyle=RED;
      ctx.font='500 14px HaimVariable,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='alphabetic';
      ctx.fillText('First fixation', cx, cy-50);
      if(elapsed>2200) { phase='flash'; start=ts; }
    }
    raf = requestAnimationFrame(draw);
  }
  raf = requestAnimationFrame(draw);
}

function getRecordDuration() {
  return (parseFloat(document.getElementById('rec-dur').value)||5)*1000;
}

function recordMode(idx) {
  return new Promise((resolve) => {
    stopFlag=true; if(raf) cancelAnimationFrame(raf); clearTimeout(window._mcTimer);
    setTimeout(() => {
      stopFlag=false; setup();
      const stream = canvas.captureStream(30);
      const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
      const recorder = new MediaRecorder(stream, {mimeType});
      const chunks = [];
      recorder.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
      recorder.onstop = () => {
        const blob = new Blob(chunks, {type:'video/webm'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href=url; a.download=NAMES[idx]+'.webm'; a.click();
        URL.revokeObjectURL(url);
        resolve();
      };
      recorder.start();
      [runGaze,runFixation,runSaccade,runScanPath,runHeatmap,runFirstFix][idx]();
      setTimeout(() => {
        stopFlag=true; if(raf) cancelAnimationFrame(raf); clearTimeout(window._mcTimer);
        recorder.stop();
      }, getRecordDuration());
    }, 80);
  });
}

async function recordAll() {
  const btn=document.getElementById('exp-all');
  const status=document.getElementById('exp-status');
  btn.disabled=true; btn.classList.add('recording');
  document.getElementById('exp-current').disabled=true;
  for(let i=0;i<6;i++) {
    status.textContent='Recording ' + (i+1) + '/6 — ' + MODES[i].name + '...';
    await recordMode(i);
    await new Promise(r=>setTimeout(r,300));
  }
  status.textContent='✓ All 6 videos downloaded';
  btn.disabled=false; btn.classList.remove('recording');
  document.getElementById('exp-current').disabled=false;
  goTo(cur);
  setTimeout(()=>{status.textContent='';},3000);
}

async function recordCurrent() {
  const btn=document.getElementById('exp-current');
  const status=document.getElementById('exp-status');
  btn.disabled=true; btn.classList.add('recording');
  document.getElementById('exp-all').disabled=true;
  status.textContent='Recording — ' + MODES[cur].name + '...';
  await recordMode(cur);
  status.textContent='✓ ' + NAMES[cur] + '.webm downloaded';
  btn.disabled=false; btn.classList.remove('recording');
  document.getElementById('exp-all').disabled=false;
  goTo(cur);
  setTimeout(()=>{status.textContent='';},3000);
}

document.getElementById('exp-current').onclick = recordCurrent;
document.getElementById('exp-all').onclick = recordAll;

function goTo(n) {
  cur=(n+6)%6;
  document.getElementById('mc-name').textContent=MODES[cur].name;
  document.getElementById('mc-desc').textContent=MODES[cur].desc;
  document.getElementById('mc-num').textContent=MODES[cur].num;
  document.querySelectorAll('.mc-dot').forEach((d,i)=>d.classList.toggle('active',i===cur));
  startAnim(cur);
}

function init() {
  const dotsEl=document.getElementById('mc-dots');
  for(let i=0;i<6;i++){
    const d=document.createElement('div'); d.className='mc-dot';
    d.onclick=()=>goTo(i); dotsEl.appendChild(d);
  }
  document.getElementById('mc-prev').onclick=()=>goTo(cur-1);
  document.getElementById('mc-next').onclick=()=>goTo(cur+1);
  goTo(0);
}

window.addEventListener('resize',()=>{ if(!stopFlag) startAnim(cur); });
setTimeout(init,80);
</script>
</body>
</html>
